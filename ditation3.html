<!DOCTYPE html>
<html lang="ml">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>വേർഡ് ആപ്പ് - പ്രോ ലൈവ് റൂം</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
:root {
    --arabic-font-size: 65px;   
    --box-left-move: 0px;       
    --box-top-move: 0px;        
}

* { box-sizing: border-box; }
body { font-family: 'Segoe UI', sans-serif; background: #eef2f3; margin: 0; padding: 10px; text-align: center; user-select: none; height: 100vh; overflow: hidden; }

.container { 
    max-width: 98%; 
    margin: 0 auto; 
    background: white; 
    padding: 12px; 
    border-radius: 12px; 
    box-shadow: 0 4px 15px rgba(0,0,0,0.1); 
    border-top: 5px solid #2ecc71; 
    height: 95vh; 
    display: flex; 
    flex-direction: column; 
    justify-content: space-between; 
    position: relative; 
}

h2 { color: #2c3e50; margin: 0; font-size: 20px; }
.header-area { display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px; }

.four-lines-container {
    display: flex;
    justify-content: space-between;
    gap: 15px;
    margin: 8px 0;
    width: 100%;
}

.four-line-box {
    flex: 1;
    height: 160px; 
    background: #fff;
    border: 2px solid #cbd5e1;
    border-radius: 8px;
    position: relative;
    overflow: hidden;
    background-image: 
        linear-gradient(#e74c3c 1px, transparent 1px), 
        linear-gradient(#3498db 1px, transparent 1px), 
        linear-gradient(#3498db 1px, transparent 1px), 
        linear-gradient(#e74c3c 1px, transparent 1px);
    background-size: 100% 160px;
    background-position: 0 40px, 0 70px, 0 100px, 0 130px;
    background-repeat: no-repeat;
}

.writing-board-section {
    margin-top: 5px;
    border-top: 2px dashed #bdc3c7;
    padding-top: 5px;
}
.writing-title {
    font-size: 14px;
    font-weight: bold;
    color: #e67e22;
    text-align: left;
    margin-bottom: 3px;
}

/* 🟥 ആനിമേഷൻ ബോർഡ് സ്ക്വയർ രൂപത്തിലാക്കി */
.full-width-board {
    width: 350px;        
    height: 350px;       
    margin: 0 auto;      
    background: #fff;
    border: 2px solid #e67e22;
    border-radius: 8px;
    position: relative;
    overflow: hidden;
}

.hw-canvas-svg {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    z-index: 5;
    pointer-events: none;
}

.arbi-text {
    font-size: var(--arabic-font-size);
    font-family: '!F Tahrir New', '!F Tahrir Old', sans-serif;
    color: #2c3e50;
    direction: rtl;
    width: 100%;
    height: 100%;
    position: absolute;
    z-index: 2;
    display: flex;
    justify-content: center;
    align-items: center;
    white-space: nowrap;
    line-height: 1;
    font-variant-ligatures: common-ligatures discretionary-ligatures;
    text-rendering: optimizeLegibility;
    -webkit-font-feature-settings: "liga" on, "clig" on;
    font-feature-settings: "liga" on, "clig" on;
    transform: translate(var(--box-left-move), var(--box-top-move)); 
}

.result-badge { position: absolute; top: 10px; right: 10px; font-size: 35px; z-index: 10; display: none; }
.result-badge-tick { color: #2ecc71; }
.timer-container { width: 100%; background: #ddd; height: 8px; border-radius: 4px; overflow: hidden; margin-bottom: 5px; }
.timer-bar { height: 100%; background: #e74c3c; width: 100%; transition: width 0.1s linear; }

.alignment-controller {
    position: fixed;
    top: 15px;
    right: 15px;
    background: rgba(44, 62, 80, 0.95);
    color: white;
    padding: 10px;
    border-radius: 8px;
    box-shadow: 0 4px 15px rgba(0,0,0,0.4);
    z-index: 10000;
    width: 180px;
    text-align: left;
    font-size: 11px;
}
.drag-header {
    padding: 3px;
    cursor: move;
    background-color: #2980b9;
    color: white;
    font-weight: bold;
    text-align: center;
    border-radius: 4px;
    margin-bottom: 6px;
    font-size: 12px;
}
.alignment-controller label { color: #bdc3c7; margin-top: 4px; font-size: 10px; display: flex; justify-content: space-between;}
.alignment-controller input, .alignment-controller select { width: 100%; margin: 2px 0; }
.alignment-controller select { background: #34495e; color: white; border: 1px solid #7f8c8d; padding: 3px; border-radius: 4px;}

.btn-pause {
    background: #e67e22;
    color: white;
    border: none;
    padding: 5px;
    font-size: 12px;
    font-weight: bold;
    border-radius: 4px;
    cursor: pointer;
    width: 100%;
    margin-top: 8px;
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 5px;
}
.btn-pause.paused { background: #2ecc71; }

@media screen and (max-width: 400px) {
    .full-width-board {
        width: 280px;   
        height: 280px;  
    }
}

@media screen and (max-height: 500px) and (orientation: landscape) {
    body { padding: 4px; }
    .container { height: 97vh; padding: 6px; }
    h2 { font-size: 16px; }
    .header-area h3 { font-size: 13px; margin: 0; }
    
    .four-line-box { 
        height: 105px; 
        background-size: 100% 105px;
        background-position: 0 25px, 0 45px, 0 65px, 0 85px;
    }
    .full-width-board { height: 160px; width: 160px; }
    .writing-board-section { margin-top: 2px; padding-top: 2px; }
    .writing-title { font-size: 12px; margin-bottom: 1px; }
}

.overlay-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(44, 62, 80, 0.95); z-index: 9999; display: flex; flex-direction: column; justify-content: center; align-items: center; color: white; padding: 20px; }

.btn-restart { background: #3498db; color: white; border: none; padding: 12px 25px; font-size: 16px; border-radius: 5px; cursor: pointer; margin-top: 15px; box-shadow: 0 4px 0 #2980b9; }
.btn-restart:active { transform: translateY(4px); box-shadow: none; }
.btn-green { background: #2ecc71; color: white; border: none; padding: 10px 20px; font-size: 15px; border-radius: 5px; cursor: pointer; margin-top: 10px; width: 100%; }
</style>
</head>
<body>

<div class="alignment-controller" id="liveTool" style="display:none;">

    <label>ഫോണ്ട് മാറ്റുക:</label>
    <select id="fontSelect" onchange="adjustText()">
        <option value="'!F Tahrir New', '!F Tahrir New Regular'">!F Tahrir New (അറബി-മലയാളം)</option>

        <option value="'KFGQPC Uthmanic Script HAFS', 'KFGQPC Uthmanic Script HAFS Regular'">KFGQPC Uthmanic HAFS</option>
        <option value="'Arabic Typesetting'">Arabic Typesetting</option>
        <option value="sans-serif">Normal Sans-Serif</option>

    <label>വലിപ്പം: <span id="valSize">65px</span></label>
    <input type="range" id="sliderSize" min="20" max="200" value="65" oninput="adjustText()">
    
    <label>ഉയരം: <span id="valTop">0px</span></label>
    <input type="range" id="sliderTop" min="-100" max="100" value="0" oninput="adjustText()">
    
    <label>ഇടത്/വലത്: <span id="valLeft">0px</span></label>
    <input type="range" id="sliderLeft" min="-100" max="100" value="0" oninput="adjustText()">

    <button id="pauseBtn" class="btn-pause" onclick="togglePause()"><i class="fa-solid fa-pause"></i> Pause</button>
</div>

<div id="startOverlay" class="overlay-screen">
    <h1><i class="fa-solid fa-display fa-2x" style="color:#2ecc71; margin-bottom:10px; display:block;"></i> വേർഡ് ആപ്പ് സ്മാർട്ട് ലൈവ് 🪄</h1>
    <div style="width:100%; max-width:350px;">
        <label style="color:white;">🏫 മദ്രസ തിരഞ്ഞെടുക്കുക:</label>
        <select id="madrasaSelect" onchange="updateStudentDropdown()"></select>
        
        <label style="color:white;">👤 കുട്ടിയുടെ പേര്:</label>
        <select id="studentSelect"></select>
        
        <button class="btn btn-green" onclick="startGame()">Class Start</button>
    </div>
</div>

<div class="container" id="gameContent" style="display:none;">
    <div class="header-area">
        <h3 id="studentHeading" style="color:#7f8c8d; font-size: 14px;">👤 കുട്ടി: </h3>
        <h2>ശ്രദ്ധിച്ചു കേൾക്കുക, എഴുതുന്നത് നോക്കുക! 🎧🖋️</h2>
        <span style="color:#aaa; font-size:11px;" id="modeIndicator">Smart Mode</span>
    </div>

    <div class="timer-container" id="timerContainer">
        <div class="timer-bar" id="timerBar"></div>
    </div>

    <div class="four-lines-container">
        <div class="four-line-box" id="boxLeft">
            <div class="arbi-text" id="textLeft"></div>
            <div class="result-badge" id="tickLeft"><i class="fa-solid fa-circle-check result-badge-tick"></i></div>
        </div>

        <div class="four-line-box" id="boxRight">
            <div class="arbi-text" id="textRight"></div>
            <div class="result-badge" id="tickRight"><i class="fa-solid fa-circle-check result-badge-tick"></i></div>
        </div>
    </div>

    <div class="writing-board-section" id="writingSection" style="display:none;">
        <div class="writing-title"><i class="fa-solid fa-pen-fancy"></i> എഴുതുന്ന രൂപം ശ്രദ്ധിക്കുക:</div>
        <div class="full-width-board">
            <!-- 🟥 viewBox മാറ്റിയതിലൂടെ എഴുത്ത് വലുതാക്കി -->
            <svg class="hw-canvas-svg" id="svgWritingBoard" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" preserveAspectRatio="xMidYMid meet"></svg>
        </div>
    </div>
</div>
