<!DOCTYPE html>
<html lang="ml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ഡിജിറ്റൽ സൗണ്ട് ബുക്ക് - സ്റ്റുഡന്റ് പാനൽ</title>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Segoe UI', sans-serif; background: #1a252f; color: white; margin: 0; padding: 0; user-select: none; overflow-x: hidden; }
        
        .container { width: 100%; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
        
        h1 { font-size: 36px; color: #3498db; margin: 0 0 5px 0; text-align: center; }
        p.subtitle { font-size: 18px; color: #bdc3c7; margin: 0 0 25px 0; text-align: center; }

        /* ക്ലിക്ക് ചെയ്യാനുള്ള നിർദ്ദേശം കാണിക്കുന്ന ബോക്സ് */
        #startOverlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(26, 37, 47, 0.95); z-index: 999; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; }
        .start-btn { background: #2ecc71; color: white; font-size: 28px; padding: 20px 40px; border-radius: 50px; border: none; font-weight: bold; box-shadow: 0 10px 20px rgba(0,0,0,0.3); }

        .workspace { display: flex; align-items: center; justify-content: center; gap: 30px; width: 100%; max-width: 1250px; margin-bottom: 25px; flex-wrap: wrap; }
        
        /* 📜 വാക്കുകൾ കാണിക്കുന്ന ഫോർ ലൈൻ ഡിസ്‌പ്ലേ ബോക്സുകൾ */
        .word-four-line { 
            position: relative;
            width: 320px; 
            height: 160px; 
            background: #ffffff; 
            border: 4px dashed #3498db; 
            border-radius: 12px; 
            overflow: hidden; 
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
            background-image: 
                linear-gradient(#e74c3c 2px, transparent 2px),
                linear-gradient(#3498db 2px, transparent 2px),
                linear-gradient(#3498db 2px, transparent 2px),
                linear-gradient(#e74c3c 2px, transparent 2px);
            background-size: 100% 160px;
            background-position: 0 35px, 0 65px, 0 95px, 0 125px;
            background-repeat: no-repeat;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.3s;
        }

        /* അറബിക് അക്ഷരങ്ങൾ വരകൾക്ക് മുകളിൽ കറക്റ്റ് ആയി വരാൻ */
        .word-text {
            font-size: 48px; 
            font-weight: bold; 
            color: #2c3e50; 
            font-family: 'Traditional Arabic', 'Amiri', Arial, sans-serif;
            text-align: center;
            direction: rtl;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -62%); /* മുകളിലെ നീല വരയ്ക്ക് കറക്റ്റ് മുകളിലാക്കാൻ */
            width: 100%;
            z-index: 5;
        }
        
        /* ⬜ നടുവിലെ ബ്ലാങ്ക് റൈറ്റിംഗ് പാഡ് */
        .blank-pad-container { 
            position: relative; 
            width: 100%; 
            max-width: 460px; 
            height: 240px; 
            background: #ffffff; 
            border: 5px solid #3498db; 
            border-radius: 12px; 
            overflow: hidden; 
            box-shadow: 0 12px 30px rgba(0,0,0,0.5);
        }
        
        #dictPlaybackEngine { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 10; }

        /* ✍️ പേന പിടിച്ച കൈ ചിത്രത്തിനുള്ള സ്റ്റൈൽ */
        #writingHand {
            position: absolute;
            width: 75px;  
            height: 75px;
            pointer-events: none;
            z-index: 20;
            display: none;
        }

        /* ടൈമറും കൺട്രോളുകളും */
        .timer-container { font-size: 28px; font-weight: bold; color: #e74c3c; margin-bottom: 25px; background: rgba(0,0,0,0.3); padding: 10px 30px; border-radius: 50px; border: 2px solid #e74c3c; display: flex; align-items: center; gap: 15px; }
        .controls-bar { width: 100%; max-width: 600px; display: flex; gap: 15px; justify-content: center; margin-top: 10px; }
        button { color: white; border: none; padding: 16px 30px; font-size: 20px; font-weight: bold; border-radius: 12px; cursor: pointer; box-shadow: 0 5px 15px rgba(0,0,0,0.3); transition: 0.2s; min-width: 150px; }
        
        .btn-orange { background: #e67e22; }
        .btn-green { background: #2ecc71; }
        .btn-purple { background: #9b59b6; }

        .big-answer { font-size: 38px; font-weight: bold; color: #2ecc71; margin: 15px 0; text-align: center; display: none;}
        .tick-timer { font-size: 30px; color: #2ecc71; font-weight: bold; margin-bottom: 20px; animation: pulse 1s infinite; display: none; }

        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }
        .loading { font-size: 24px; color: #3498db; font-weight: bold; }

        @media (max-width: 768px) {
            .workspace { flex-direction: column; gap: 20px; }
            .word-four-line { width: 100%; height: 140px; background-size: 100% 140px; background-position: 0 30px, 0 55px, 0 80px, 0 105px; }
            .blank-pad-container { max-width: 100%; height: 200px; }
        }
    </style>
</head>
<body>

    <div id="startOverlay" onclick="initApp()">
        <div class="start-btn">▶️ ക്ലാസ്സ് ആരംഭിക്കുക</div>
        <p style="color: #bdc3c7; margin-top: 15px; font-size: 16px;">(ഓഡിയോ കൃത്യമായി കേൾക്കാൻ ഇവിടെ ക്ലിക്ക് ചെയ്യുക)</p>
    </div>

    <div class="container">
        <div id="loadingText" class="loading" style="display:none;">🔄 അഡ്മിൻ പാനലിൽ നിന്നുള്ള ഡാറ്റയും ഓഡിയോയും ലോഡ് ചെയ്യുന്നു...</div>

        <div id="mainContent" style="display:none; width: 100%; flex-direction: column; align-items: center;">
            <h1>🎓 ഡിജിറ്റൽ കേട്ടെഴുത്ത് പാനൽ</h1>
            <p class="subtitle">ശബ്ദം ശ്രദ്ധിച്ച് കേട്ട് ഫോർ ലൈനിൽ ശരിയായ വാക്ക് കണ്ടെത്തുക</p>

            <div class="workspace">
                <div id="wordBox1" class="word-four-line">
                    <span id="wordText1" class="word-text">???</span>
                </div>

                <div class="blank-pad-container" id="padArea">
                    <svg id="dictPlaybackEngine" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 1000" preserveAspectRatio="none"></svg>
                    <img id="writingHand" src="hand.png" alt="Hand">
                </div>

                <div id="wordBox2" class="word-four-line">
                    <span id="wordText2" class="word-text">???</span>
                </div>
            </div>

            <div id="mainTimerContainer" class="timer-container">
                <span id="timerIcon">⏳</span>
                <span id="timerText">ബാക്കി സമയം: 30 സെക്കൻഡ്</span>
            </div>

            <div id="bigAnswerText" class="big-answer"></div>
            <div id="tickTimerText" class="tick-timer">📝 നോട്ട്ബുക്കിൽ ടിക്ക് ഇടൂ... (5)</div>

            <div class="controls-bar">
                <button id="btnPauseResume" class="btn-orange" onclick="togglePauseResume()">⏸️ Pause</button>
                <button id="btnForceSkip" class="btn-purple" style="display:none;" onclick="startNewRound()">➡️ അടുത്ത വാക്ക്</button>
            </div>
        </div>
    </div>

    <audio id="audioPlayer" style="display:none;"></audio>

    <script>
        let wordAppData = { words: [] };
        let allWords = [];
        let currentTargetWord = null;
        let timerId = null;
        let audioIntervalId = null;
        let selfCheckTimerId = null;
        
        let timeLeft = 30;
        let isPaused = false;
        let animationLoopCount = 0; 

        function initApp() {
            document.getElementById('startOverlay').style.display = 'none';
            document.getElementById('loadingText').style.display = 'block';
            loadWordAppData();
        }

        async function loadWordAppData() {
            try {
                let r = await fetch(`./data/data.json?t=${Date.now()}`);
                if(r.ok) {
                    wordAppData = await r.json();
                    extractLatestWords();
                } else {
                    document.getElementById('loadingText').innerText = "❌ data/data.json ഫയൽ കണ്ടെത്താനായില്ല!";
                }
            } catch(e) {
                document.getElementById('loadingText').innerText = "❌ ഡാറ്റ ലോഡ് ചെയ്യുന്നതിൽ പിശക്!";
            }
        }

        function extractLatestWords() {
            allWords = [];
            let source = wordAppData.words || wordAppData;

            if(Array.isArray(source)) {
                source.forEach(item => {
                    allWords.push({
                        word: item.arbiText || item.word || "", 
                        malWord: item.mal || "",               
                        audioSrc: item.audio ? `data/${item.audio}` : "", 
                        path: item.writingPaths || null         
                    });
                });
            }

            if(allWords.length < 2) {
                document.getElementById('loadingText').innerText = "❌ പാനലിൽ കുറഞ്ഞത് 2 വാക്കുകളെങ്കിലും വേണം!";
                return;
            }

            document.getElementById('loadingText').style.display = 'none';
            document.getElementById('mainContent').style.display = 'flex';
            
            startNewRound();
        }

        function startNewRound() {
            clearInterval(timerId);
            clearInterval(audioIntervalId);
            clearInterval(selfCheckTimerId);
            document.getElementById('audioPlayer').pause();

            isPaused = false;
            timeLeft = 30;
            animationLoopCount = 0;

            document.getElementById('mainTimerContainer').style.display = 'flex';
            document.getElementById('bigAnswerText').style.display = 'none';
            document.getElementById('tickTimerText').style.display = 'none';
            document.getElementById('btnPauseResume').style.display = 'block';
            document.getElementById('btnPauseResume').className = "btn-orange";
            document.getElementById('btnPauseResume').innerText = "⏸️ Pause";
            document.getElementById('btnForceSkip').style.display = 'none';
            document.getElementById('timerIcon').innerText = "⏳";
            document.getElementById('dictPlaybackEngine').innerHTML = "";
            document.getElementById('writingHand').style.display = 'none';

            document.getElementById('wordBox1').style.border = "4px dashed #3498db";
            document.getElementById('wordBox1').style.background = "#ffffff";
            document.getElementById('wordBox2').style.border = "4px dashed #3498db";
            document.getElementById('wordBox2').style.background = "#ffffff";

            let shuffled = [...allWords].sort(() => 0.5 - Math.random());
            let w1 = shuffled[0];
            let w2 = shuffled[1];

            document.getElementById('wordText1').innerText = w1.word;
            document.getElementById('wordBox1').setAttribute('data-word', w1.word);
            document.getElementById('wordText2').innerText = w2.word;
            document.getElementById('wordBox2').setAttribute('data-word', w2.word);

            currentTargetWord = Math.random() > 0.5 ? w1 : w2;

            let player = document.getElementById('audioPlayer');
            function playVoice() {
                if(!isPaused && currentTargetWord.audioSrc) {
                    player.src = currentTargetWord.audioSrc + "?t=" + Date.now();
                    player.play().catch(e => console.log("ഓഡിയോ പ്ലേ പ്രശ്നം:", e));
                }
            }
            playVoice();
            audioIntervalId = setInterval(playVoice, 3800); 

            document.getElementById('timerText').innerText = `ബാക്കി സമയം: ${timeLeft} സെക്കൻഡ്`;
            timerId = setInterval(() => {
                if(!isPaused) {
                    timeLeft--;
                    if(timeLeft <= 0) {
                        clearInterval(timerId);
                        revealAnswerAutomatically();
                    } else {
                        document.getElementById('timerText').innerText = `ബാക്കി സമയം: ${timeLeft} സെക്കൻഡ്`;
                    }
                }
            }, 1000);
        }

        function togglePauseResume() {
            let btn = document.getElementById('btnPauseResume');
            let player = document.getElementById('audioPlayer');
            if(!isPaused) {
                isPaused = true;
                btn.innerText = "▶️ Resume";
                btn.className = "btn-green";
                player.pause();
            } else {
                isPaused = false;
                btn.innerText = "⏸️ Pause";
                btn.className = "btn-orange";
                player.play().catch(e => console.log(e));
            }
        }

        function revealAnswerAutomatically() {
            clearInterval(timerId);
            clearInterval(audioIntervalId);
            document.getElementById('audioPlayer').pause();

            document.getElementById('mainTimerContainer').style.display = 'none';
            document.getElementById('btnPauseResume').style.display = 'none';

            let box1 = document.getElementById('wordBox1');
            let box2 = document.getElementById('wordBox2');
            
            if(box1.getAttribute('data-word') === currentTargetWord.word) {
                box1.style.border = "5px solid #2ecc71";
                box1.style.background = "#e8f8f5";
            } else {
                box2.style.border = "5px solid #2ecc71";
                box2.style.background = "#e8f8f5";
            }

            let ansDiv = document.getElementById('bigAnswerText');
            ansDiv.innerText = `ശരിയുത്തരം: ${currentTargetWord.word} ${currentTargetWord.malWord ? '('+currentTargetWord.malWord+')' : ''}`;
            ansDiv.style.display = 'block';

            if(currentTargetWord.path && currentTargetWord.path.length > 0) {
                animationLoopCount = 0; 
                document.getElementById('writingHand').style.display = 'block';
                runHandwritingLoop();   
            } else {
                startSelfCheckCountdown();
            }
        }

        function runHandwritingLoop() {
            animationLoopCount++;
            if (animationLoopCount <= 3) { 
                document.getElementById('dictPlaybackEngine').innerHTML = "";
                animateHandwriting(currentTargetWord.path, () => {
                    setTimeout(runHandwritingLoop, 800);
                });
            } else {
                document.getElementById('writingHand').style.display = 'none';
                startSelfCheckCountdown();
            }
        }

        // ✍️ ഹാൻഡ്‌റൈറ്റിംഗ് ബോക്സിന്റെ നടുവിലാക്കുന്ന (Auto Center & Scale) ഫംഗ്ഷൻ
        function animateHandwriting(pathPoints, onCompleteCB) {
            if(!pathPoints || pathPoints.length === 0) { if(onCompleteCB) onCompleteCB(); return; }
            
            let svg = document.getElementById('dictPlaybackEngine');
            let hand = document.getElementById('writingHand');
            let padArea = document.getElementById('padArea');
            
            let g = document.createElementNS("http://www.w3.org/2000/svg", "g");
            let paths = [];

            // 🎛️ കോർഡിനേറ്റുകളുടെ മിനിമം, മാക്സിമം വാല്യൂസ് കണ്ട് പിടിച്ച് ഓട്ടോമാറ്റിക് സെന്റർ ചെയ്യുന്നു
            let minX = Infinity, maxX = -Infinity, minY = Infinity, maxY = -Infinity;
            pathPoints.forEach(line => {
                line.forEach(pt => {
                    if(pt.x < minX) minX = pt.x;
                    if(pt.x > maxX) maxX = pt.x;
                    if(pt.y < minY) minY = pt.y;
                    if(pt.y > maxY) maxY = pt.y;
                });
            });

            let drawnWidth = maxX - minX;
            let drawnHeight = maxY - minY;
            if(drawnWidth <= 0) drawnWidth = 100;
            if(drawnHeight <= 0) drawnHeight = 100;

            // അഡ്മിൻ പാനലിലെ വരകളെ സ്റ്റുഡന്റ് പാനലിന്റെ ബോക്സിന്റെ കൃത്യം നടുവിലേക്ക് മാപ്പ് ചെയ്യുന്നു
            let scaleX = 350 / drawnWidth;
            let scaleY = 160 / drawnHeight;
            let scale = Math.min(scaleX, scaleY, 0.35); // വലിപ്പം ഒരു പരിധിയിൽ കൂടാതെ കാക്കുന്നു

            let offsetX = (1000 - (drawnWidth * scale)) / 2 - (minX * scale);
            let offsetY = (1000 - (drawnHeight * scale)) / 2 - (minY * scale);

            for(let i=0; i<8; i++) {
                let p = document.createElementNS("http://www.w3.org/2000/svg", "path");
                p.setAttribute("transform", `translate(${(i-4)*0.2}, ${-(i-4)*0.2})`);
                p.setAttribute("stroke", "#27ae60"); 
                p.setAttribute("stroke-width", "9"); 
                p.setAttribute("fill", "none");
                p.setAttribute("stroke-linecap", "round");
                
                let startX = pathPoints[0][0].x * scale + offsetX;
                let startY = pathPoints[0][0].y * scale + offsetY;
                p.setAttribute("d", `M ${startX} ${startY}`);
                g.appendChild(p);
                paths.push(p);
            }
            svg.appendChild(g);

            function moveHand(svgX, svgY) {
                let rect = padArea.getBoundingClientRect();
                let realX = (svgX / 1000) * rect.width;
                let realY = (svgY / 1000) * rect.height;
                // പേന പിടിച്ച കൈയുടെ അലൈൻമെന്റ്
                hand.style.left = `${realX - 25}px`;
                hand.style.top = `${realY - 55}px`;
            }

            let ptIdx = 0;
            let lineIdx = 0;
            let speed = 12; 

            let initialX = pathPoints[0][0].x * scale + offsetX;
            let initialY = pathPoints[0][0].y * scale + offsetY;
            moveHand(initialX, initialY);

            function drawStep() {
                if (lineIdx >= pathPoints.length) {
                    clearInterval(interval);
                    if(onCompleteCB) onCompleteCB();
                    return;
                }

                let currentLine = pathPoints[lineIdx];
                let currPt = currentLine[ptIdx];

                if (!currPt) {
                    lineIdx++;
                    ptIdx = 0;
                    if (lineIdx < pathPoints.length && pathPoints[lineIdx][0]) {
                        let nX = pathPoints[lineIdx][0].x * scale + offsetX;
                        let nY = pathPoints[lineIdx][0].y * scale + offsetY;
                        paths.forEach(p => {
                            p.setAttribute("d", p.getAttribute("d") + ` M ${nX} ${nY}`);
                        });
                        moveHand(nX, nY);
                    }
                    return;
                }

                let finalX = currPt.x * scale + offsetX;
                let finalY = currPt.y * scale + offsetY;

                let dString = ` L ${finalX} ${finalY}`;
                paths.forEach(p => p.setAttribute("d", p.getAttribute("d") + dString));
                
                moveHand(finalX, finalY);
                ptIdx++;
            }

            let interval = setInterval(drawStep, speed);
        }

        function startSelfCheckCountdown() {
            let tickTimeLeft = 5;
            let tickUi = document.getElementById('tickTimerText');
            tickUi.innerText = `📝 നോട്ട്ബുക്കിൽ ടിക്ക് ഇടൂ... (${tickTimeLeft})`;
            tickUi.style.display = 'block';
            document.getElementById('btnForceSkip').style.display = 'block';

            selfCheckTimerId = setInterval(() => {
                tickTimeLeft--;
                if(tickTimeLeft <= 0) {
                    clearInterval(selfCheckTimerId);
                    startNewRound(); 
                } else {
                    tickUi.innerText = `📝 നോട്ട്ബുക്കിൽ ടിക്ക് ഇടൂ... (${tickTimeLeft})`;
                }
            }, 1000);
        }
    </script>
</body>
</html>
